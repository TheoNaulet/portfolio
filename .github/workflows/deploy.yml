name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx next build
      - name: Fix asset paths in static HTML
        run: |
          find out -name '*.html' -exec sed -i 's|src="/images/|src="/portfolio/images/|g' {} +
          find out -name '*.html' -exec sed -i "s|url('/images/|url('/portfolio/images/|g" {} +
          find out -name '*.css' -exec sed -i "s|url('/images/|url('/portfolio/images/|g" {} +
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
